<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis System Architecture</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  body{font-family:'Inter',system-ui,sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
  #breadcrumb{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 24px;
    background:linear-gradient(180deg,rgba(10,14,23,.95) 60%,transparent);
    font-size:13px;color:#64748b;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
  #breadcrumb span{color:#94a3b8;cursor:pointer;transition:color .2s}
  #breadcrumb span:hover{color:#e2e8f0}
  #breadcrumb span.active{color:#e2e8f0}
  #breadcrumb .sep{color:#334155;cursor:default}
  #title{text-align:center;padding:72px 20px 0;opacity:.6;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#64748b}
  #canvas{position:relative;width:100%;min-height:calc(100vh - 100px);padding:20px}
  #lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
  #lines line{stroke:#1e293b;stroke-width:1.5;fill:none;transition:all .5s cubic-bezier(.4,0,.2,1)}
  #lines line.active{stroke:#334155;stroke-width:2}
  #lines line.pipeline{stroke:#0e7490;stroke-width:2;stroke-dasharray:6 3}
  #lines line.step-line{stroke:#22543d;stroke-width:1.5;stroke-dasharray:4 4}
  .node{position:absolute;border-radius:16px;background:#111827;border:1px solid #1e293b;
    cursor:pointer;transition:all .5s cubic-bezier(.4,0,.2,1);z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:16px 12px;user-select:none;opacity:0;transform:scale(.85) translateY(10px)}
  .node.visible{opacity:1;transform:scale(1) translateY(0)}
  .node:hover{border-color:#334155;transform:translateY(-2px)!important;box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .node.expanded{border-color:#475569;box-shadow:0 0 40px rgba(99,102,241,.08)}
  .node.top{width:160px;height:90px}
  .node.child{width:150px;height:72px}
  .node.step{width:180px;height:56px}
  .node .emoji{font-size:24px;margin-bottom:4px;line-height:1}
  .node.child .emoji,.node.step .emoji{font-size:16px;margin-bottom:2px}
  .node .name{font-weight:600;font-size:13px;line-height:1.2;margin-bottom:4px;color:#f1f5f9}
  .node.child .name,.node.step .name{font-size:11px;font-weight:500}
  .badge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:99px;letter-spacing:.3px;text-transform:uppercase}
  .badge.opus{background:rgba(234,179,8,.15);color:#facc15}
  .badge.sonnet{background:rgba(59,130,246,.15);color:#60a5fa}
  .badge.haiku{background:rgba(34,197,94,.15);color:#4ade80}
  .badge.cron{background:rgba(168,85,247,.15);color:#c084fc}
  .badge.telegram{background:rgba(239,68,68,.15);color:#f87171}
  .badge.service{background:rgba(100,116,139,.15);color:#94a3b8}
  .badge.pipeline{background:rgba(6,182,212,.15);color:#22d3ee}
  .badge.step{background:rgba(34,197,94,.1);color:#4ade80}
  .node .desc{font-size:10px;color:#64748b;margin-top:2px;line-height:1.2;max-width:140px}
  #sidebar{position:fixed;right:0;top:0;bottom:0;width:340px;background:#0f1420;border-left:1px solid #1e293b;
    z-index:200;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
    padding:60px 24px 24px;overflow-y:auto;font-size:13px}
  #sidebar.open{transform:translateX(0)}
  #sidebar h2{font-size:16px;font-weight:600;margin-bottom:4px}
  #sidebar .sub{margin-bottom:16px}
  #sidebar .detail-section{margin-bottom:16px}
  #sidebar .detail-section h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#475569;margin-bottom:8px}
  #sidebar .detail-item{background:#111827;border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:12px;line-height:1.5;color:#94a3b8}
  #sidebar .detail-item strong{color:#e2e8f0}
  #sidebar-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#64748b;cursor:pointer;font-size:20px;line-height:1}
  @media(max-width:768px){
    .node.top{width:110px;height:76px;padding:10px 6px}
    .node .emoji{font-size:20px}
    .node .name{font-size:10px}
    .badge{font-size:7px;padding:1px 6px}
    .node.child{width:110px;height:58px}
    .node.step{width:130px;height:46px}
    #sidebar{width:260px}
    .node .desc{display:none}
  }
</style>
</head>
<body>
<div id="breadcrumb"><span class="active" onclick="collapseAll()">Jarvis System</span></div>
<div id="title">System Architecture · V3</div>
<div id="canvas"><svg id="lines"></svg></div>
<div id="sidebar">
  <button id="sidebar-close" onclick="closeSidebar()">&times;</button>
  <div id="sidebar-content"></div>
</div>
<script>
const NODES={
  jarvis:{id:'jarvis',emoji:'🤖',name:'Jarvis',badge:'opus',badgeText:'Opus 4.6',desc:'Main Orchestrator',
    detail:{description:'Central orchestrator and primary intelligence. Manages all sub-agents, cron scheduling, memory consolidation, and direct interaction with Mr. Berman.',workspace:'/home/jarvis/.openclaw/workspace',files:['SOUL.md','AGENTS.md','MEMORY.md','TOOLS.md','SAFETY.md','IDENTITY.md'],threadId:'-1003798176791:topic:2'},
    children:[
      {id:'c-dream',emoji:'🌙',name:'Dream Cycle',badge:'cron',badgeText:'Cron',desc:'3:00 AM · Opus',detail:{schedule:'0 3 * * *',model:'claude-opus-4-6',description:'Nightly memory consolidation — reviews daily memory files, promotes important patterns to MEMORY.md, prunes stale entries.'}},
      {id:'c-selfrepair',emoji:'🔧',name:'Self-Repair',badge:'cron',badgeText:'Cron',desc:'4:00 AM · Opus',detail:{schedule:'0 4 * * *',model:'claude-opus-4-6',description:'Automated self-healing — checks workspace integrity, fixes broken configs, validates tool connections.'}},
      {id:'c-nightly',emoji:'🚀',name:'Nightly Initiative',badge:'cron',badgeText:'Cron',desc:'2:00 AM · Opus',detail:{schedule:'0 2 * * *',model:'claude-opus-4-6',description:'Proactive improvement cycle — identifies optimization opportunities, proposes system enhancements. Delivers report to Telegram.'}},
      {id:'c-secdigest',emoji:'📋',name:'Security Digest',badge:'cron',badgeText:'Cron',desc:'6:00 AM · Sonnet',detail:{schedule:'0 6 * * *',model:'claude-sonnet-4-5',description:'Daily security summary — compiles overnight scan results, flags anomalies.'}},
      {id:'c-secscan',emoji:'🛡️',name:'Security Scan',badge:'cron',badgeText:'Cron',desc:'Every 6h · Haiku',detail:{schedule:'0 */6 * * *',model:'claude-haiku-4-5',description:'Periodic security sweep — SSH logs, firewall, open ports, failed auth.'}},
      {id:'c-version',emoji:'📦',name:'Version Check',badge:'cron',badgeText:'Cron',desc:'Weekly · Haiku',detail:{schedule:'0 5 * * 1',model:'claude-haiku-4-5',description:'Weekly dependency and version audit — OpenClaw, Node.js, system packages.'}},
      {id:'c-selfimprove',emoji:'💡',name:'Self-Improvement',badge:'cron',badgeText:'Cron',desc:'Daily · Opus',detail:{schedule:'0 1 * * *',model:'claude-opus-4-6',description:'Research new OpenClaw features, optimize prompts, improve workflows.'}},
      {id:'t-main',emoji:'💬',name:'Main Orchestrator',badge:'telegram',badgeText:'Topic',desc:'Thread ID: 2'},
      {id:'t-modelopt',emoji:'💬',name:'Model Optimization',badge:'telegram',badgeText:'Topic',desc:'Thread ID: 638'},
      {id:'t-security',emoji:'💬',name:'Security & Infra',badge:'telegram',badgeText:'Topic',desc:'Thread ID: 936'},
      {id:'s-gmail',emoji:'📧',name:'Gmail',badge:'service',badgeText:'Service',desc:'bermanjarvismk3'},
      {id:'s-todoist',emoji:'✅',name:'Todoist',badge:'service',badgeText:'Service',desc:'Task board'}
    ]},
  brief:{id:'brief',emoji:'📰',name:'Daily Brief',badge:'sonnet',badgeText:'Sonnet 4.5',desc:'Intelligence Briefing',
    detail:{description:'Three-stage intelligence pipeline delivering a curated daily briefing covering tech, AI, markets, and topics of interest.',workspace:'/home/jarvis/.openclaw/workspace',files:['crons/brief-research.md','crons/brief-evaluator.md','crons/brief-delivery.md'],threadId:'-1003798176791:topic:534'},
    children:[
      {id:'b-research',emoji:'🔍',name:'Brief Research',badge:'pipeline',badgeText:'Stage 1',desc:'6:00 AM · Sonnet',detail:{schedule:'0 6 * * *',model:'claude-sonnet-4-5',description:'Gathers raw intelligence from web search, Twitter API, RSS feeds.',pipeline:'→ Evaluator'}},
      {id:'b-evaluator',emoji:'⚖️',name:'Brief Evaluator',badge:'pipeline',badgeText:'Stage 2',desc:'6:15 AM · Opus',detail:{schedule:'15 6 * * *',model:'claude-opus-4-6',description:'Scores and filters research bundle. Ranks by relevance, structures final brief.',pipeline:'→ Delivery'}},
      {id:'b-delivery',emoji:'📨',name:'Brief Delivery',badge:'pipeline',badgeText:'Stage 3',desc:'6:30 AM · Sonnet',detail:{schedule:'30 6 * * *',model:'claude-sonnet-4-5',description:'Formats and delivers final briefing to Telegram Daily Brief topic.',pipeline:'End'}},
      {id:'bt-brief',emoji:'💬',name:'Daily Brief',badge:'telegram',badgeText:'Topic',desc:'Thread ID: 534'},
      {id:'bs-gmail',emoji:'📧',name:'Gmail',badge:'service',badgeText:'Service',desc:'Newsletter sources'},
      {id:'bs-twitter',emoji:'🐦',name:'Twitter API',badge:'service',badgeText:'Service',desc:'X/Twitter intel'}
    ]},
  career:{id:'career',emoji:'💼',name:'Career Coach',badge:'sonnet',badgeText:'Sonnet 4.5',desc:'Career Strategy',
    detail:{description:'Strategic career advisor — monitors job markets, refines resume/positioning, tracks applications, provides coaching.',threadId:'-1003798176791:topic:316'},
    children:[
      {id:'ct-coach',emoji:'💬',name:'CareerCoach',badge:'telegram',badgeText:'Topic',desc:'Thread ID: 316'},
      {id:'ct-intel',emoji:'💬',name:'CareerIntel',badge:'telegram',badgeText:'Topic',desc:'Thread ID: 748'},
      {id:'cs-todoist',emoji:'✅',name:'Todoist',badge:'service',badgeText:'Service',desc:'Application tracking'}
    ]},
  portfolio:{id:'portfolio',emoji:'🎨',name:'Portfolio Builder',badge:'opus',badgeText:'Opus 4.6',desc:'Portfolio Site',
    detail:{description:"Builds and maintains Mr. Berman's personal portfolio website. Manages versioning, deployment via GitHub Pages.",url:'https://wetjuice.github.io/mberman-portfolio/',threadId:'-1003798176791:topic:470'},
    children:[
      {id:'pt-portfolio',emoji:'💬',name:'Portfolio',badge:'telegram',badgeText:'Topic',desc:'Thread ID: 470'},
      {id:'ps-github',emoji:'🐙',name:'GitHub Pages',badge:'service',badgeText:'Service',desc:'wetjuice.github.io'}
    ]},
  realestate:{id:'realestate',emoji:'🏠',name:'Real Estate',badge:'sonnet',badgeText:'Sonnet 4.5',desc:'Property Intel',
    detail:{description:'Property intelligence — researches neighborhoods, schools, open houses, market data. Reports to Google Drive.',driveFolder:'1ms0GBrkE1lA-wNJzOXzBVuzrkAYuQxkN',threadId:'-1003798176791:topic:818'},
    children:[
      {id:'rt-realestate',emoji:'💬',name:'RealEstate',badge:'telegram',badgeText:'Topic',desc:'Thread ID: 818'},
      {id:'rs-drive',emoji:'📁',name:'Google Drive',badge:'service',badgeText:'Service',desc:'Property docs'}
    ]},
  heartbeat:{id:'heartbeat',emoji:'💓',name:'Heartbeat',badge:'haiku',badgeText:'Haiku 4.5',desc:'System Monitor',
    detail:{description:'10-step monitoring pipeline running every 30 minutes. Checks system health, email, tasks, memory state.',schedule:'Every 30 min',model:'claude-haiku-4-5'},
    children:[
      {id:'h1',emoji:'⏱️',name:'Time Gate',badge:'step',badgeText:'Step 1',desc:'Elapsed time check'},
      {id:'h2',emoji:'📂',name:'Load State',badge:'step',badgeText:'Step 2',desc:'Read state file'},
      {id:'h3',emoji:'📧',name:'Email Check',badge:'step',badgeText:'Step 3',desc:'Urgent unread scan'},
      {id:'h4',emoji:'🖥️',name:'Hardware Health',badge:'step',badgeText:'Step 4',desc:'CPU, RAM, temp'},
      {id:'h5',emoji:'💾',name:'Disk Space',badge:'step',badgeText:'Step 5',desc:'Storage check'},
      {id:'h6',emoji:'✅',name:'Todoist Check',badge:'step',badgeText:'Step 6',desc:'Active tasks'},
      {id:'h7',emoji:'🏠',name:'Open House Detect',badge:'step',badgeText:'Step 7',desc:'New listings'},
      {id:'h8',emoji:'🧠',name:'Memory Maint.',badge:'step',badgeText:'Step 8',desc:'Prune & consolidate'},
      {id:'h9',emoji:'📊',name:'Log Usage',badge:'step',badgeText:'Step 9',desc:'Token tracking'},
      {id:'h10',emoji:'💾',name:'Update State',badge:'step',badgeText:'Step 10',desc:'Write state file'}
    ]}
};

const TOP_ORDER=['jarvis','brief','career','portfolio','realestate','heartbeat'];
let expanded={},nodePositions={};
const canvas=document.getElementById('canvas'),svg=document.getElementById('lines'),breadcrumbEl=document.getElementById('breadcrumb');

function calcPositions(){
  nodePositions={};
  const W=canvas.getBoundingClientRect().width;
  const topCount=TOP_ORDER.length;
  const spacing=Math.min(200,(W-40)/topCount);
  const startX=(W-spacing*(topCount-1))/2-80;
  const topY=120;
  let maxBottom=topY+110;

  TOP_ORDER.forEach((id,i)=>{
    const x=startX+i*spacing;
    nodePositions[id]={x,y:topY};
    if(expanded[id]){
      const children=NODES[id].children||[];
      if(id==='heartbeat'){
        children.forEach((c,ci)=>{nodePositions[c.id]={x:x-10,y:topY+120+ci*68}});
        maxBottom=Math.max(maxBottom,topY+120+children.length*68+40);
      } else {
        const cols=Math.min(3,children.length);
        const cSpacing=170;
        const cStartX=x+80-((Math.min(cols,children.length)-1)*cSpacing)/2;
        children.forEach((c,ci)=>{
          nodePositions[c.id]={x:cStartX+(ci%cols)*cSpacing-75,y:topY+120+Math.floor(ci/cols)*90};
        });
        maxBottom=Math.max(maxBottom,topY+120+Math.ceil(children.length/cols)*90+40);
      }
    }
  });
  canvas.style.minHeight=(maxBottom+40)+'px';
}

function render(){
  calcPositions();
  const validIds=new Set(Object.keys(nodePositions));
  canvas.querySelectorAll('.node').forEach(el=>{
    if(!validIds.has(el.dataset.id)){el.style.opacity='0';el.style.transform='scale(.8)';setTimeout(()=>el.remove(),350);}
  });
  for(const[id,pos]of Object.entries(nodePositions)){
    let el=canvas.querySelector('.node[data-id="'+id+'"]');
    const isTop=TOP_ORDER.includes(id);
    const nd=isTop?NODES[id]:findChild(id);
    if(!nd)continue;
    if(!el){
      el=document.createElement('div');
      el.className='node '+(isTop?'top':nd.badge==='step'?'step':'child');
      el.dataset.id=id;
      el.innerHTML='<div class="emoji">'+nd.emoji+'</div><div class="name">'+nd.name+'</div><span class="badge '+nd.badge+'">'+nd.badgeText+'</span>'+(nd.desc?'<div class="desc">'+nd.desc+'</div>':'');
      el.addEventListener('click',function(e){e.stopPropagation();handleClick(id)});
      canvas.appendChild(el);
      el.style.left=pos.x+'px';el.style.top=pos.y+'px';
      requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('visible')));
    } else {
      el.style.left=pos.x+'px';el.style.top=pos.y+'px';
    }
    el.classList.toggle('expanded',!!expanded[id]);
  }
  renderLines();renderBreadcrumb();
}

function findChild(id){for(const n of Object.values(NODES)){const f=(n.children||[]).find(c=>c.id===id);if(f)return f;}return null;}

function renderLines(){
  svg.innerHTML='';
  const ch=Math.max(canvas.scrollHeight,canvas.clientHeight);
  svg.setAttribute('width',canvas.scrollWidth);svg.setAttribute('height',ch);
  const jp=nodePositions.jarvis;if(!jp)return;
  TOP_ORDER.forEach(id=>{
    if(id==='jarvis')return;
    const p=nodePositions[id];if(!p)return;
    mkLine(jp.x+80,jp.y+90,p.x+80,p.y,expanded[id]?'active':'');
  });
  TOP_ORDER.forEach(pid=>{
    if(!expanded[pid])return;
    const pp=nodePositions[pid],node=NODES[pid];
    (node.children||[]).forEach((child,i)=>{
      const cp=nodePositions[child.id];if(!cp)return;
      const pw=160,cw=child.badge==='step'?180:150;
      mkLine(pp.x+pw/2,pp.y+90,cp.x+cw/2,cp.y,'active');
      if(pid==='heartbeat'&&i>0){
        const prev=nodePositions[node.children[i-1].id];
        if(prev)mkLine(prev.x+90,prev.y+56,cp.x+90,cp.y,'step-line');
      }
      if(pid==='brief'&&['b-research','b-evaluator'].includes(child.id)){
        const nextId=child.id==='b-research'?'b-evaluator':'b-delivery';
        const np=nodePositions[nextId];
        if(np)mkLine(cp.x+150,cp.y+36,np.x,np.y+36,'pipeline');
      }
    });
  });
}

function mkLine(x1,y1,x2,y2,cls){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  if(cls)cls.split(' ').forEach(c=>l.classList.add(c));
  svg.appendChild(l);
}

function renderBreadcrumb(){
  let h='<span class="active" onclick="collapseAll()">Jarvis System</span>';
  Object.keys(expanded).filter(k=>expanded[k]).forEach(id=>{
    const n=NODES[id];if(n)h+='<span class="sep">›</span><span class="active">'+n.emoji+' '+n.name+'</span>';
  });
  breadcrumbEl.innerHTML=h;
}

function handleClick(id){
  if(TOP_ORDER.includes(id)&&NODES[id].children){
    if(expanded[id]){delete expanded[id];removeChildren(id);}
    else{Object.keys(expanded).forEach(k=>{removeChildren(k)});expanded={};expanded[id]=true;}
    render();
  } else {showSidebar(id);}
}

function removeChildren(id){(NODES[id].children||[]).forEach(c=>{const el=canvas.querySelector('.node[data-id="'+c.id+'"]');if(el){el.style.opacity='0';el.style.transform='scale(.8)';setTimeout(()=>el.remove(),350);}});}

function collapseAll(){Object.keys(expanded).forEach(k=>removeChildren(k));expanded={};closeSidebar();render();}

function showSidebar(id){
  const isTop=TOP_ORDER.includes(id);
  const nd=isTop?NODES[id]:findChild(id);if(!nd)return;
  const d=nd.detail||{};
  let h='<h2>'+nd.emoji+' '+nd.name+'</h2><div class="sub"><span class="badge '+nd.badge+'">'+nd.badgeText+'</span></div>';
  if(d.description)h+='<div class="detail-section"><h3>Description</h3><div class="detail-item">'+d.description+'</div></div>';
  if(d.schedule)h+='<div class="detail-section"><h3>Schedule</h3><div class="detail-item"><strong>'+d.schedule+'</strong></div></div>';
  if(d.model)h+='<div class="detail-section"><h3>Model</h3><div class="detail-item">'+d.model+'</div></div>';
  if(d.workspace)h+='<div class="detail-section"><h3>Workspace</h3><div class="detail-item" style="font-family:monospace;font-size:11px">'+d.workspace+'</div></div>';
  if(d.files)h+='<div class="detail-section"><h3>Key Files</h3>'+d.files.map(f=>'<div class="detail-item" style="font-family:monospace;font-size:11px">'+f+'</div>').join('')+'</div>';
  if(d.threadId)h+='<div class="detail-section"><h3>Thread ID</h3><div class="detail-item" style="font-family:monospace;font-size:11px">'+d.threadId+'</div></div>';
  if(d.pipeline)h+='<div class="detail-section"><h3>Pipeline</h3><div class="detail-item">'+d.pipeline+'</div></div>';
  if(d.url)h+='<div class="detail-section"><h3>URL</h3><div class="detail-item"><a href="'+d.url+'" style="color:#60a5fa" target="_blank">'+d.url+'</a></div></div>';
  if(d.driveFolder)h+='<div class="detail-section"><h3>Drive Folder</h3><div class="detail-item" style="font-family:monospace;font-size:11px">'+d.driveFolder+'</div></div>';
  document.getElementById('sidebar-content').innerHTML=h;
  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar(){document.getElementById('sidebar').classList.remove('open');}
window.addEventListener('resize',()=>render());
render();
</script>
</body>
</html>
