<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — System Overview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#222233;
--border:#2a2a3a;--text:#e4e4ef;--text2:#8888a0;--text3:#55556a;
--accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.15);
--green:#34d399;--amber:#fbbf24;--rose:#f43f5e;--cyan:#22d3ee;--purple:#a78bfa;
--orange:#fb923c;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow-x:hidden;line-height:1.5}
a{color:var(--accent2);text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;justify-content:space-between;flex-wrap:wrap}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:-.02em}
.nav-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.nav-tabs{display:flex;gap:4px;flex-wrap:wrap}
.nav-tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:.2s;border:none;background:none}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--text);background:var(--surface2)}
.nav-time{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.view{display:none;padding:20px;max-width:1200px;margin:0 auto}
.view.active{display:block}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:24px 0 12px;padding-left:2px}
.section-title:first-child{margin-top:0}
.agents-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:640px){.agents-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:960px){.agents-grid{grid-template-columns:repeat(3,1fr)}}
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.agent-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.agent-card.expanded{grid-column:1/-1}
.agent-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.agent-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.agent-name{font-weight:600;font-size:15px}
.agent-model{font-size:11px;color:var(--text3);font-family:'SF Mono',Monaco,monospace;margin-top:2px}
.agent-role{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.4}
.agent-connections{display:flex;flex-wrap:wrap;gap:6px}
.conn-tag{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);white-space:nowrap}
.conn-tag.telegram{border-color:#2a9ed6;color:#54b8e8}
.conn-tag.api{border-color:#6366f1;color:var(--accent2)}
.conn-tag.github{border-color:#555;color:#ccc}
.agent-detail{display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.agent-card.expanded .agent-detail{display:block}
.detail-section{margin-bottom:14px}
.detail-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}
.file-list{display:flex;flex-wrap:wrap;gap:4px}
.file-tag{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--surface3);color:var(--text2);font-family:'SF Mono',Monaco,monospace}
.pipeline-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pipeline-step{font-size:12px;padding:4px 10px;border-radius:6px;background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(99,102,241,.2)}
.pipeline-arrow{color:var(--text3);font-size:14px}
.heartbeat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:12px}
.hb-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.hb-icon{font-size:20px;animation:pulse 2s infinite}
.hb-steps{display:grid;gap:6px}
.hb-step{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:8px;background:var(--surface2);font-size:13px;cursor:pointer;transition:.15s}
.hb-step:hover{background:var(--surface3)}
.hb-num{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;background:var(--surface3);color:var(--text2)}
.hb-step-info{flex:1}
.hb-step-name{font-weight:600;font-size:13px}
.hb-step-detail{font-size:11px;color:var(--text3);margin-top:2px;display:none}
.hb-step.expanded .hb-step-detail{display:block}
.hb-freq{font-size:10px;color:var(--text3);white-space:nowrap;font-family:'SF Mono',Monaco,monospace}
.timeline-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.timeline-inner{min-width:600px}
.timeline-header{display:flex;padding:0 0 8px 140px;border-bottom:1px solid var(--border);margin-bottom:8px}
.timeline-hour{flex:1;font-size:10px;color:var(--text3);text-align:left;font-variant-numeric:tabular-nums}
@media(max-width:640px){.timeline-header{padding-left:80px}.timeline-label{width:80px!important;font-size:11px!important}}
.timeline-row{display:flex;align-items:center;padding:6px 0;position:relative;min-height:36px}
.timeline-label{width:140px;flex-shrink:0;font-size:12px;font-weight:500;padding-right:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timeline-track{flex:1;position:relative;height:28px;background:var(--surface);border-radius:6px;overflow:hidden}
.timeline-block{position:absolute;top:3px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:rgba(255,255,255,.9);cursor:pointer;transition:.15s;min-width:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 6px}
.timeline-block:hover{transform:scaleY(1.15);z-index:2;filter:brightness(1.2)}
.timeline-tooltip{display:none;position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:12px;z-index:200;pointer-events:none;max-width:280px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.timeline-tooltip.show{display:block}
.timeline-tooltip h4{font-weight:600;margin-bottom:4px}
.timeline-tooltip p{color:var(--text2);font-size:11px;line-height:1.4}
.timeline-now{position:absolute;top:0;bottom:0;width:2px;background:var(--rose);z-index:10;pointer-events:none}
.timeline-now::after{content:'NOW';position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:var(--rose);letter-spacing:.05em}
.hb-bar{background:repeating-linear-gradient(90deg,var(--green) 0,var(--green) 2px,transparent 2px,transparent 8px);opacity:.25;top:3px;height:22px;border-radius:5px;position:absolute}
.channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.channel-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;transition:.2s}
.channel-card:hover{border-color:var(--cyan);background:var(--surface2)}
.channel-icon{font-size:24px;margin-bottom:6px}
.channel-name{font-size:13px;font-weight:600}
.channel-id{font-size:10px;color:var(--text3);font-family:'SF Mono',Monaco,monospace;margin-top:2px}
.channel-agents{margin-top:8px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.channel-agent-dot{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px}
.service-row{display:flex;align-items:center;gap:16px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:.15s}
.service-row:hover{border-color:var(--accent);background:var(--surface2)}
.service-icon{font-size:22px;width:40px;text-align:center;flex-shrink:0}
.service-info{flex:1;min-width:0}
.service-name{font-weight:600;font-size:14px}
.service-desc{font-size:12px;color:var(--text2);margin-top:2px}
.service-agents{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.service-agent-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.flow-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.flow-card:hover{border-color:var(--purple)}
.flow-name{font-weight:600;font-size:14px;margin-bottom:10px}
.flow-steps{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.flow-step{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;border:1px solid var(--border);background:var(--surface2)}
.flow-step-icon{font-size:14px}
.flow-step-time{font-size:10px;color:var(--text3);font-family:'SF Mono',Monaco,monospace}
.flow-arrow{color:var(--text3)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand"><span class="dot"></span> Jarvis</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="agents">Agents</button>
    <button class="nav-tab" data-view="schedule">Schedule</button>
    <button class="nav-tab" data-view="channels">Channels</button>
    <button class="nav-tab" data-view="services">Services</button>
    <button class="nav-tab" data-view="flows">Data Flows</button>
  </div>
  <div class="nav-time" id="clock"></div>
</nav>

<div class="view active" id="view-agents">
  <div class="section-title">Agents</div>
  <div class="agents-grid" id="agents-grid"></div>
  <div class="section-title">Heartbeat System</div>
  <div class="heartbeat-card">
    <div class="hb-header">
      <span class="hb-icon">💓</span>
      <div>
        <div style="font-weight:600;font-size:15px">Heartbeat Monitor</div>
        <div style="font-size:12px;color:var(--text3)">Claude Haiku 4.5 · Every 60 min · 24/7</div>
      </div>
    </div>
    <div class="hb-steps" id="hb-steps"></div>
  </div>
</div>

<div class="view" id="view-schedule">
  <div class="section-title">24-Hour Schedule</div>
  <div class="timeline-scroll">
    <div class="timeline-inner">
      <div class="timeline-header" id="timeline-header"></div>
      <div id="timeline-rows"></div>
    </div>
  </div>
</div>

<div class="view" id="view-channels">
  <div class="section-title">Telegram Topics</div>
  <p style="font-size:12px;color:var(--text3);margin-bottom:16px">Group: -1003798176791 · 12 topic channels routing messages between agents and systems</p>
  <div class="channels-grid" id="channels-grid"></div>
</div>

<div class="view" id="view-services">
  <div class="section-title">External Services</div>
  <div id="services-list"></div>
</div>

<div class="view" id="view-flows">
  <div class="section-title">Data Flows</div>
  <div id="flows-list"></div>
</div>

<div class="timeline-tooltip" id="tooltip"></div>

<script>
const agents = [
  {id:'jarvis',name:'Jarvis',emoji:'🎩',role:'Primary orchestrator — conversations, task management, system stewardship',model:'Claude Opus 4.6',color:'var(--accent)',workspace:'~/.openclaw/workspace',files:['MEMORY.md','AGENTS.md','SOUL.md','HEARTBEAT.md','TOOLS.md','SAFETY.md','USER.md','IDENTITY.md'],dirs:['memory/*.md','gmail/','scripts/','cron/','twitter/','docs/','security/'],connections:[{name:'ALL Telegram topics',type:'telegram'},{name:'Gmail API',type:'api'},{name:'Todoist API',type:'api'},{name:'Google Drive',type:'api'}]},
  {id:'brief',name:'Daily Brief',emoji:'📰',role:'Daily intelligence briefing — research, evaluation, delivery pipeline',model:'Claude Sonnet 4.5',color:'var(--cyan)',workspace:'~/.openclaw/workspace-daily-brief',files:['FORMAT-EMAIL.md','CONFIG.md','evaluator-prompt.md'],dirs:['briefs/','engagement/','scripts/'],pipeline:['Research 6:30AM','Evaluator 6:45AM','Delivery 7:00AM'],connections:[{name:'Brief topic',type:'telegram'},{name:'Gmail',type:'api'},{name:'TwitterAPI.io',type:'api'}]},
  {id:'career',name:'Career Coach',emoji:'💼',role:'Career strategy, job search, career intel',model:'Claude Sonnet 4.5',color:'var(--amber)',workspace:'~/.openclaw/workspace-career-coach',files:['MIKE-BERMAN-PROFILE.md','architecture.md','job-recommendations.md','linkedin-profile.md'],dirs:['profile/','tracking/','portfolio/'],connections:[{name:'CareerCoach topic',type:'telegram'},{name:'CareerIntel topic',type:'telegram'},{name:'Todoist',type:'api'}]},
  {id:'portfolio',name:'Portfolio Builder',emoji:'🎨',role:'Portfolio website development',model:'Claude Opus 4.6',color:'var(--purple)',workspace:'~/.openclaw/workspace-portfolio-builder',files:['design-system.md','tech-stack.md','portfolio/BRIEF.md','MIKE-BERMAN-PROFILE.md'],dirs:[],connections:[{name:'Portfolio topic',type:'telegram'},{name:'GitHub',type:'github'}]},
  {id:'realestate',name:'Real Estate',emoji:'🏠',role:'Property intelligence briefs, open house research',model:'Claude Sonnet 4.5',color:'var(--green)',workspace:'~/.openclaw/workspace-real-estate',files:['AGENTS.md','memory/real-estate-preferences.md'],dirs:[],trigger:'Heartbeat step 7 (calendar open house detection)',connections:[{name:'RealEstate topic',type:'telegram'},{name:'Google Drive',type:'api'}]}
];

const heartbeatSteps = [
  {num:1,name:'Time Gate',detail:'Determines day (06-23) vs overnight (23-06) mode',freq:'every beat'},
  {num:2,name:'Load State',detail:'Reads heartbeat-state.json',freq:'every beat'},
  {num:3,name:'Email Check',detail:'Gmail API → alerts to Email topic (threadId=6)',freq:'50 min, day'},
  {num:4,name:'Hardware Health',detail:'Runs hardware-health.sh → alerts to SysHealth topic',freq:'4h'},
  {num:5,name:'Disk Space',detail:'Runs df -h / → alerts to SysHealth topic',freq:'4h'},
  {num:6,name:'Todoist Tasks',detail:'Todoist API → spawns sub-agents → Tasks (19) + Main (2)',freq:'1h day/2h night'},
  {num:7,name:'Open House Detection',detail:'Calendar API → triggers real-estate agent → RealEstate topic',freq:'every beat, day'},
  {num:8,name:'Memory Maintenance',detail:'Reads/writes MEMORY.md — consolidation',freq:'72h'},
  {num:9,name:'Log Usage',detail:'Writes heartbeat log',freq:'every beat'},
  {num:10,name:'Update State',detail:'Writes heartbeat-state.json',freq:'every beat'}
];

const cronJobs = [
  {name:'Dream Cycle',hour:2,duration:.75,agent:'main',model:'Opus',desc:'Memory consolidation, system cleanup',color:'var(--purple)'},
  {name:'Self-Repair',hour:3,duration:.5,agent:'default',model:'—',desc:'Fix broken configs, clear errors',color:'#666'},
  {name:'Nightly Initiative',hour:4,duration:1.5,agent:'main',model:'Opus 4.6',desc:'Self-directed creative project',color:'var(--accent)'},
  {name:'Initiative Delivery',hour:6,duration:.25,agent:'main',model:'Haiku',desc:'Delivers initiative summary',color:'var(--accent2)'},
  {name:'Brief Research',hour:6.5,duration:.25,agent:'daily-brief',model:'Sonnet',desc:'Gathers intel from web, Twitter, HN',color:'var(--cyan)'},
  {name:'Brief Evaluator',hour:6.75,duration:.25,agent:'daily-brief',model:'Opus 4.6',desc:'Deep analysis of research',color:'var(--cyan)'},
  {name:'Brief Delivery',hour:7,duration:.25,agent:'daily-brief',model:'Sonnet',desc:'Compiles HTML brief, sends email',color:'var(--cyan)'},
  {name:'Security Digest',hour:8,duration:.5,agent:'main',model:'—',desc:'Weekly security summary (Mon)',color:'var(--rose)',weekly:'Mon'},
  {name:'Security Scan',hour:9,duration:.5,agent:'default',model:'—',desc:'Automated security audit (Mon)',color:'var(--rose)',weekly:'Mon'},
  {name:'Version Check',hour:10,duration:.15,agent:'main',model:'—',desc:'Check for OpenClaw updates',color:'var(--green)'},
  {name:'Self-Improvement',hour:14,duration:1,agent:'default',model:'Opus',desc:'System optimization audit (Sun)',color:'var(--orange)',weekly:'Sun'}
];

const channels = [
  {name:'Main',id:2,emoji:'💬',agents:['jarvis']},
  {name:'Brief',id:3,emoji:'📰',agents:['brief']},
  {name:'ModelOpt',id:4,emoji:'⚙️',agents:['jarvis']},
  {name:'SysHealth',id:5,emoji:'🖥️',agents:['jarvis']},
  {name:'Email',id:6,emoji:'📧',agents:['jarvis']},
  {name:'Research',id:18,emoji:'🔬',agents:['jarvis']},
  {name:'Tasks',id:19,emoji:'📋',agents:['jarvis']},
  {name:'Portfolio',id:134,emoji:'🎨',agents:['portfolio']},
  {name:'GameDev',id:204,emoji:'🎮',agents:['jarvis']},
  {name:'CareerCoach',id:760,emoji:'💼',agents:['career']},
  {name:'CareerIntel',id:1313,emoji:'🕵️',agents:['career']},
  {name:'RealEstate',id:1613,emoji:'🏠',agents:['realestate']}
];

const services = [
  {name:'Gmail API',icon:'📧',desc:'bermanjarvismk3@gmail.com — email check, send, calendar',agents:['Jarvis','Daily Brief'],colors:['var(--accent)','var(--cyan)']},
  {name:'Google Drive',icon:'📁',desc:'Shared Jarvis folder + 🏠 Real Estate subfolder',agents:['Jarvis','Real Estate'],colors:['var(--accent)','var(--green)']},
  {name:'Todoist API',icon:'✅',desc:'Task board: Backlog → In Progress → Waiting → Completed → Icebox',agents:['Jarvis','Career Coach'],colors:['var(--accent)','var(--amber)']},
  {name:'TwitterAPI.io',icon:'🐦',desc:'X/Twitter read-only intel for daily brief research',agents:['Daily Brief'],colors:['var(--cyan)']},
  {name:'GitHub',icon:'🐙',desc:'Wetjuice/mberman-portfolio — portfolio repo + game repos',agents:['Portfolio Builder'],colors:['var(--purple)']}
];

const flows = [
  {name:'📰 Daily Brief Pipeline',steps:[{icon:'🔍',label:'Research',time:'6:30 AM',detail:'Web, Twitter, HN intel gathering'},{icon:'🧠',label:'Evaluator',time:'6:45 AM',detail:'Deep analysis with Opus 4.6'},{icon:'📬',label:'Delivery',time:'7:00 AM',detail:'HTML brief → Gmail + Telegram'}]},
  {name:'💡 Nightly Initiative Pipeline',steps:[{icon:'🌙',label:'Initiative',time:'4:00 AM',detail:'Self-directed creative project'},{icon:'📨',label:'Delivery',time:'6:00 AM',detail:'Summary delivered to Mr. Berman'}]},
  {name:'💓 Heartbeat → Real Estate Trigger',steps:[{icon:'💓',label:'Heartbeat',time:'Every 60m',detail:'Step 7: Calendar check'},{icon:'📅',label:'Open House Detected',time:'',detail:'Calendar API finds event'},{icon:'🏠',label:'Real Estate Agent',time:'',detail:'Property brief generated'},{icon:'📱',label:'Telegram',time:'',detail:'Report to RealEstate topic'}]},
  {name:'🧹 Overnight Maintenance',steps:[{icon:'🌙',label:'Dream Cycle',time:'2:00 AM',detail:'Memory consolidation'},{icon:'🔧',label:'Self-Repair',time:'3:00 AM',detail:'Fix configs, clear errors'},{icon:'💡',label:'Initiative',time:'4:00 AM',detail:'Creative project work'}]}
];

// Render
const agentsGrid = document.getElementById('agents-grid');
agents.forEach(a => {
  const card = document.createElement('div');
  card.className = 'agent-card';
  card.innerHTML = `
    <div class="agent-header">
      <div class="agent-icon" style="background:${a.color}22;color:${a.color}">${a.emoji}</div>
      <div><div class="agent-name">${a.name}</div><div class="agent-model">${a.model}</div></div>
    </div>
    <div class="agent-role">${a.role}</div>
    <div class="agent-connections">${a.connections.map(c=>'<span class="conn-tag '+c.type+'">'+c.name+'</span>').join('')}</div>
    <div class="agent-detail">
      <div class="detail-section"><h4>Workspace</h4><div class="file-tag" style="margin-bottom:8px">${a.workspace}</div></div>
      <div class="detail-section"><h4>Key Files</h4><div class="file-list">${a.files.map(f=>'<span class="file-tag">'+f+'</span>').join('')}</div></div>
      ${a.dirs&&a.dirs.length?'<div class="detail-section"><h4>Directories</h4><div class="file-list">'+a.dirs.map(f=>'<span class="file-tag">'+f+'</span>').join('')+'</div></div>':''}
      ${a.pipeline?'<div class="detail-section"><h4>Pipeline</h4><div class="pipeline-flow">'+a.pipeline.map((s,i)=>(i?'<span class="pipeline-arrow">→</span>':'')+'<span class="pipeline-step">'+s+'</span>').join('')+'</div></div>':''}
      ${a.trigger?'<div class="detail-section"><h4>Trigger</h4><p style="font-size:12px;color:var(--text2)">'+a.trigger+'</p></div>':''}
    </div>`;
  card.onclick = () => card.classList.toggle('expanded');
  agentsGrid.appendChild(card);
});

const hbContainer = document.getElementById('hb-steps');
heartbeatSteps.forEach(s => {
  const el = document.createElement('div');
  el.className = 'hb-step';
  el.innerHTML = `<div class="hb-num">${s.num}</div><div class="hb-step-info"><div class="hb-step-name">${s.name}</div><div class="hb-step-detail">${s.detail}</div></div><div class="hb-freq">${s.freq}</div>`;
  el.onclick = () => el.classList.toggle('expanded');
  hbContainer.appendChild(el);
});

const header = document.getElementById('timeline-header');
for(let h=0;h<24;h++){const el=document.createElement('div');el.className='timeline-hour';el.textContent=h===0?'12a':h<12?h+'a':h===12?'12p':(h-12)+'p';header.appendChild(el)}

const timelineRows = document.getElementById('timeline-rows');
const hbRow = document.createElement('div');
hbRow.className = 'timeline-row';
hbRow.innerHTML = '<div class="timeline-label" style="color:var(--green)">💓 Heartbeat</div><div class="timeline-track"><div class="hb-bar" style="left:0;width:100%;position:absolute"></div></div>';
timelineRows.appendChild(hbRow);

cronJobs.forEach(job => {
  const row = document.createElement('div');
  row.className = 'timeline-row';
  const left = (job.hour/24)*100;
  const width = Math.max((job.duration/24)*100, 0.8);
  row.innerHTML = '<div class="timeline-label">'+(job.weekly?job.name+' <span style="color:var(--text3);font-size:10px">'+job.weekly+'</span>':job.name)+'</div><div class="timeline-track"><div class="timeline-block" style="left:'+left+'%;width:'+width+'%;background:'+job.color+'" data-tip="'+job.name+'|'+job.desc+'|Agent: '+job.agent+' · Model: '+job.model+(job.weekly?' · '+job.weekly+' only':'')+'"></div></div>';
  timelineRows.appendChild(row);
});

function updateNowLine(){
  const now=new Date();const pct=(now.getHours()*60+now.getMinutes())/(24*60)*100;
  document.querySelectorAll('.timeline-track').forEach(track=>{
    let line=track.querySelector('.timeline-now');
    if(!line){line=document.createElement('div');line.className='timeline-now';track.appendChild(line)}
    line.style.left=pct+'%';
  });
}
updateNowLine();setInterval(updateNowLine,60000);

const tooltip=document.getElementById('tooltip');
document.addEventListener('mouseover',e=>{const b=e.target.closest('.timeline-block');if(b&&b.dataset.tip){const[t,d,m]=b.dataset.tip.split('|');tooltip.innerHTML='<h4>'+t+'</h4><p>'+d+'</p><p style="margin-top:4px;color:var(--text3)">'+m+'</p>';tooltip.classList.add('show')}});
document.addEventListener('mousemove',e=>{if(tooltip.classList.contains('show')){tooltip.style.left=Math.min(e.clientX+12,window.innerWidth-290)+'px';tooltip.style.top=(e.clientY+12)+'px'}});
document.addEventListener('mouseout',e=>{if(e.target.closest('.timeline-block'))tooltip.classList.remove('show')});

const channelsGrid=document.getElementById('channels-grid');
const agentColorMap={jarvis:'var(--accent)',brief:'var(--cyan)',career:'var(--amber)',portfolio:'var(--purple)',realestate:'var(--green)'};
const agentEmojiMap={jarvis:'🎩',brief:'📰',career:'💼',portfolio:'🎨',realestate:'🏠'};
channels.forEach(ch=>{
  const card=document.createElement('div');card.className='channel-card';
  card.innerHTML='<div class="channel-icon">'+ch.emoji+'</div><div class="channel-name">'+ch.name+'</div><div class="channel-id">ID: '+ch.id+'</div><div class="channel-agents">'+ch.agents.map(a=>'<div class="channel-agent-dot" style="background:'+agentColorMap[a]+'33;color:'+agentColorMap[a]+'" title="'+a+'">'+agentEmojiMap[a]+'</div>').join('')+'</div>';
  channelsGrid.appendChild(card);
});

const servicesList=document.getElementById('services-list');
services.forEach(s=>{
  const row=document.createElement('div');row.className='service-row';
  row.innerHTML='<div class="service-icon">'+s.icon+'</div><div class="service-info"><div class="service-name">'+s.name+'</div><div class="service-desc">'+s.desc+'</div></div><div class="service-agents">'+s.agents.map((a,i)=>'<span class="service-agent-pill" style="background:'+s.colors[i]+'22;color:'+s.colors[i]+'">'+a+'</span>').join('')+'</div>';
  servicesList.appendChild(row);
});

const flowsList=document.getElementById('flows-list');
flows.forEach(f=>{
  const card=document.createElement('div');card.className='flow-card';
  card.innerHTML='<div class="flow-name">'+f.name+'</div><div class="flow-steps">'+f.steps.map((s,i)=>(i?'<span class="flow-arrow">→</span>':'')+'<div class="flow-step"><span class="flow-step-icon">'+s.icon+'</span><div><div style="font-weight:600">'+s.label+'</div>'+(s.time?'<div class="flow-step-time">'+s.time+'</div>':'')+'<div style="font-size:11px;color:var(--text3)">'+s.detail+'</div></div></div>').join('')+'</div>';
  flowsList.appendChild(card);
});

document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.onclick=()=>{document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));tab.classList.add('active');document.getElementById('view-'+tab.dataset.view).classList.add('active')};
});

function updateClock(){const now=new Date();document.getElementById('clock').textContent=now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/Los_Angeles'})+' PST'}
updateClock();setInterval(updateClock,1000);
</script>
</body>
</html>
